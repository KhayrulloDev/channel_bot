services:
  channel_bot:
    build: .
    container_name: channel_ai_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Sozlamalar va post tarixi konteyner o'chirilsa ham yo'qolmasligi uchun
      - ./data:/app/data
      # Kodni o'zgartirganda konteynerni qayta build qilmasdan sinash uchun (ixtiyoriy)
      # - .:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

